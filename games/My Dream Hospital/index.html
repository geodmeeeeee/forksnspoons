<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>My Dream Hospital Doctor Games Emergency Room | Skitterix</title>
    <style>
        /* Setup & Centering */
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background: #231F20; font-family: sans-serif; }
        #unity-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #unity-canvas { width: auto; height: 100%; max-width: 100vw; aspect-ratio: 6 / 9; object-fit: contain; }

        /* Loading Screen */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #231F20; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s; }
        #loading-logo { width: 180px; margin-bottom: 25px; }
        #bar-bg { width: 220px; height: 8px; background: #444; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: #00e5ff; transition: width 0.2s; }
        #loading-text { color: #aaa; margin-top: 12px; font-size: 13px; letter-spacing: 1px; }

        /* Fullscreen Button */
        #fs-btn { position: absolute; bottom: 20px; right: 20px; padding: 8px 12px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; cursor: pointer; z-index: 10; font-size: 12px; }
        #fs-btn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <img id="loading-logo" src="logo.png"> <div id="bar-bg"><div id="bar-fill"></div></div>
        <div id="loading-text">INITIALIZING... 0%</div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <button id="fs-btn" onclick="openFullscreen()">⛶ FULLSCREEN</button>
    </div>

    <script src="Build/Hospital.loader.js"></script>
    <script>
        // --- CONFIGURATION: UPDATE THESE FOR EVERY NEW GAME ---
        const config = {
            dataUrl: "Build/Hospital.data.unityweb",
            frameworkUrl: "Build/Hospital.framework.js.unityweb",
            codeUrl: "Build/Hospital.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Skitterix",
            productName: "Smart Looter",
            productVersion: "1.0",
        };
        // ------------------------------------------------------

        const canvas = document.querySelector("#unity-canvas");
        const fill = document.querySelector("#bar-fill");
        const txt = document.querySelector("#loading-text");
        const overlay = document.querySelector("#loading-overlay");

        createUnityInstance(canvas, config, (progress) => {
            const p = Math.round(progress * 100);
            fill.style.width = p + "%";
            txt.innerHTML = "LOADING... " + p + "%";
        }).then((instance) => {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 500);
        });

        function openFullscreen() {
            const container = document.querySelector("#unity-container");
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
