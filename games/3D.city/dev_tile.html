<script type="module">
	import * as THREE from './build/three.module.min.js'
	import * as UIL from './build/uil.module.js'
	import { MapGenerator } from './src/micro/map/MapGenerator.js';
	import { OrbitControls } from './src/jsm/controls/OrbitControls.js';
	import { GroundShader } from './src/city3d/GroundShader.js';



	let camera, scene, renderer, orbitControls;
	let mesh;

	init();
	animate();

	function randInt( low, high ) {return  low + Math.floor( Math.random() * ( high - low + 1 ) ) }

	function init() {

		camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 100 );
		camera.position.z = 5;
		camera.position.y = 5;

		scene = new THREE.Scene();

		const textureTile = new THREE.TextureLoader().load( 'assets/textures/tiles.png' );
		textureTile.colorSpace = THREE.SRGBColorSpace;

		const textureNorm = new THREE.TextureLoader().load( 'assets/textures/tiles_n.png' );

		const geometry = new THREE.PlaneGeometry( 16, 16, 7, 7 );
		geometry.rotateX( -Math.PI * 0.5 );
		
		geometry.setAttribute( 'color', new THREE.BufferAttribute( new Float32Array(8 * 8 * 4), 4 ) );

		const position = geometry.attributes.position;
		console.log( position )
		const colors = geometry.attributes.color;
		const ar = colors.array
		let n

		for (let i = 0; i < colors.count; i++) {
			n = i*4
			ar[n] = randInt(1,30)
			ar[n+1] = randInt(1,30)
			ar[n+2] = randInt(1,30)
			ar[n+3] = 1//randInt(1,30)
			//colors.setXYZW( i * 4 , randInt(1,30), randInt(1,30), randInt(1,30), randInt(1,30) );
		}

		colors.needsUpdate = true;

		console.log( colors )


		const material = new GroundShader( { map:textureTile, normalMap:textureNorm } );

		mesh = new THREE.Mesh( geometry, material );
		scene.add( mesh );

		const dirLight = new THREE.DirectionalLight( 0xffffff, 5 );
		dirLight.position.set( -5, 10, 6 );
		scene.add( dirLight );
		

		renderer = new THREE.WebGLRenderer( { antialias: true } );
		renderer.setPixelRatio( window.devicePixelRatio );
		renderer.setSize( window.innerWidth, window.innerHeight );
		document.body.appendChild( renderer.domElement );

		orbitControls = new OrbitControls( camera, renderer.domElement );
		orbitControls.target.set( 0, 0, 0 );
		orbitControls.enablePan = false;
		orbitControls.update();

		//

		window.addEventListener( 'resize', onWindowResize );

	}

	function onWindowResize() {

		camera.aspect = window.innerWidth / window.innerHeight;
		camera.updateProjectionMatrix();

		renderer.setSize( window.innerWidth, window.innerHeight );

	}

	function animate() {

		requestAnimationFrame( animate );

		mesh.rotation.y += 0.0005;
		//mesh.rotation.y += 0.01;

		renderer.render( scene, camera );

	}
