<!DOCTYPE html>
<html>
<head>

<!-- Google tag (gtag.js) -->
<script async src="G-P5GL39LYY5"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-P5GL39LYY5');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Forks N Frogz</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="navbar-container">
  <div class="navbar">
    <h1 class="navbar-title">Forks N Frogz</h1>
    <div class="tab-container">
      <button class="tab-btn active" onclick="switchTab('games')" data-tab="games">
        <span class="tab-icon">🎮</span>
        <span class="tab-label">Games</span>
      </button>
      <button class="tab-btn" onclick="switchTab('movies')" data-tab="movies">
        <span class="tab-icon">🎬</span>
        <span class="tab-label">Movies</span>
      </button>
      <button class="tab-btn" onclick="switchTab('extras')" data-tab="extras">
        <span class="tab-icon">⭐</span>
        <span class="tab-label">Extras</span>
      </button>
      <div class="tab-indicator"></div>
    </div>
    <input class="search" id="search" placeholder="Search...">
  </div>
  
  <div class="category-bar" id="categoryBar" style="display:none;">
    <div class="category-container">
      <button class="category-btn" onclick="switchCategory('all')">All</button>
      <button class="category-btn" onclick="switchCategory('flash')">Flash</button>
      <button class="category-btn" onclick="switchCategory('html5')">HTML5</button>
    </div>
  </div>
</div>

<div class="main-container">
  <div class="content-wrapper">
    <div class="grid" id="grid"></div>
  </div>
  <div class="credits" id="credits">Credits to Cortlin Ferraiuolo</div>
</div>

<div id="player">
  <div class="controls">
    <button onclick="closeGame()">Close</button>
    <button onclick="full()">Fullscreen</button>
    <button id="muteBtn" onclick="toggleMute()" aria-pressed="false">Mute</button>
  </div>
  <iframe id="frame" allow="autoplay; fullscreen"></iframe>
</div>

<div class="secret" id="secret">
  <h3>Secret Menu</h3>
  <div style="margin-top:20px;font-size:14px;color:#6b8cff;">Made by Matthew Gibson</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="index.js"></script>

</body>
</html>
