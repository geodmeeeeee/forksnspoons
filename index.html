<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Forks N Frogz</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div id="openingPage" class="opening-container">
  <div class="opening-header">
    <h1 class="site-title">Forks N Frogz</h1>
    <p class="site-subtitle">Your Ultimate Unblocked Experince</p>
  </div>
  
  <div class="opening-content">
    <p class="welcome-text"></p>
    
    <div class="nav-grid">
      <div class="nav-card" onclick="goToTab('games')">
        <div class="nav-icon">🎮</div>
        <h2>Games</h2>
        <p>Browse my actually decently sized collection of games :)</p>
      </div>
      
      <div class="nav-card" onclick="goToTab('movies')">
        <div class="nav-icon">🎬</div>
        <h2>Movies</h2>
        <p>Watch No Movies Since Im Lazy</p>
      </div>

      
      <div class="nav-card" onclick="goToTab('extras')">
        <div class="nav-icon">⭐</div>
        <h2>Extras</h2>
        <p>my stupid ah dont know what to put here :(</p>
      </div>
    </div>
  </div>
</div>

<div id="mainContent" class="main-content hidden">
  <div class="topbar">
    <button class="back-btn" onclick="goToHome()">← Home</button>
    <input class="search" id="search" placeholder="Search...">
    <div class="filter-container">
      <button class="filter-btn" onclick="toggleFilter()">Filter</button>
      <div class="filter-menu" id="filterMenu"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="credits" id="credits">Credits to Cortlin Ferraiuolo</div>
</div>

<div id="player">
  <div class="controls">
    <button onclick="closeGame()">Close</button>
    <button onclick="full()">Fullscreen</button>
    <button id="muteBtn" onclick="toggleMute()" aria-pressed="false">Mute</button>
  </div>
  <iframe id="frame" allow="autoplay; fullscreen"></iframe>
</div>

<div class="secret" id="secret">
  <h3>Secret Menu</h3>
  <div style="margin-top:20px;font-size:14px;color:#6b8cff;">Made by Matthew Gibson</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="index.js"></script>

</body>
</html>
